# Copy this file to /etc/nginx/sites-available/codearena
# Then link: sudo ln -s /etc/nginx/sites-available/codearena /etc/nginx/sites-enabled/
# Then restart: sudo systemctl restart nginx

# Rate Limiting Zones (DDoS Protection)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=socket_limit:10m rate=50r/s;

server {
    listen 80;
    server_name api.yourdomain.com; # <--- Replace with your actual domain or Public IP

    # We proxy all traffic to the Node.js API server running on port 4000
    location / {
        # Apply standard API rate limit (burst of 20, don't delay within burst)
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://localhost:4000;
        
        # Standard Proxy Headers
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket Support (Required for Socket.IO)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
    }

    # Specific block for Socket.IO polling/upgrades (higher rate limit needed)
    location /socket.io/ {
        limit_req zone=socket_limit burst=100 nodelay;

        proxy_pass http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
        
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
    }
        
        # Increase timeouts for long-running code executions
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
    }

