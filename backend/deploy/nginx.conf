# Copy this file to /etc/nginx/sites-available/codearena
# Then link: sudo ln -s /etc/nginx/sites-available/codearena /etc/nginx/sites-enabled/
# Then restart: sudo systemctl restart nginx

# Rate Limiting Zones (DDoS Protection)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=socket_limit:10m rate=50r/s;

upstream backend_server {
    # Match the PORT env var (default: 4000)
    server backend:4000;
}

server {
    listen 80;
    # server_name api.codearena.live; # Replace with your domain in production
    server_name localhost; # Default for local testing

    # ACME-challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name api.codearena.live;

    # SSL Configuration (Will be generated by Certbot)
    ssl_certificate /etc/letsencrypt/live/api.codearena.live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.codearena.live/privkey.pem;
    
    # Modern SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

    # Apply standard API rate limit
    location / {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://backend_server;
        
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket Support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;

        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Specific block for Socket.IO
    location /socket.io/ {
        limit_req zone=socket_limit burst=100 nodelay;

        proxy_pass http://backend_server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_read_timeout 3600s; # Long timeout for persistent socket connections
        proxy_send_timeout 3600s;
    }
}

