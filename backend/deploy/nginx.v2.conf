# Updated Nginx Configuration for Distributed Event-Driven System
# Supports: API Backend, Judge Service, WebSocket, Load Balancing
# 
# Copy this file to /etc/nginx/sites-available/codearena
# Then link: sudo ln -s /etc/nginx/sites-available/codearena /etc/nginx/sites-enabled/
# Then restart: sudo systemctl restart nginx

# ============================================================================
# RATE LIMITING ZONES (DDoS Protection)
# ============================================================================

# Standard API rate limit: 10 requests per second
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# Socket.IO rate limit: 50 requests per second (higher for real-time)
limit_req_zone $binary_remote_addr zone=socket_limit:10m rate=50r/s;

# Judge service rate limit: 5 requests per second (code execution is expensive)
limit_req_zone $binary_remote_addr zone=judge_limit:10m rate=5r/s;

# ============================================================================
# UPSTREAM SERVERS (Backend Services)
# ============================================================================

# Backend API Server (Future: Add multiple instances for load balancing)
upstream backend_server {
    # Current: Single instance
    server backend:4000;
    
    # Future: Multiple instances for horizontal scaling
    # server backend-1:4000;
    # server backend-2:4000;
    # server backend-3:4000;
    # 
    # Load balancing algorithm options:
    # - least_conn;  (least connections)
    # - ip_hash;     (session persistence)
    # - random;      (random distribution)
}

# Judge Service (Code Execution Microservice)
upstream judge_server {
    server judge:3001;
    
    # Future: Multiple Judge instances for scaling
    # server judge-1:3001;
    # server judge-2:3001;
}

# ============================================================================
# HTTPS SERVER (Main Configuration)
# ============================================================================

server {
    listen 443 ssl http2;
    server_name api-codearena.duckdns.org;

    # ========================================================================
    # SSL/TLS Configuration (Managed by Certbot)
    # ========================================================================
    ssl_certificate /etc/letsencrypt/live/api-codearena.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api-codearena.duckdns.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Modern SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    # ========================================================================
    # MAIN API ROUTES (Backend Service)
    # ========================================================================
    
    location / {
        # Apply standard API rate limit
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://backend_server;
        proxy_http_version 1.1;
        
        # Headers for proper request forwarding
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # WebSocket Support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ========================================================================
    # SOCKET.IO ROUTES (Real-time Communication)
    # ========================================================================
    
    location /socket.io/ {
        # Apply higher rate limit for Socket.IO
        limit_req zone=socket_limit burst=100 nodelay;

        proxy_pass http://backend_server;
        proxy_http_version 1.1;
        
        # Headers for proper request forwarding
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket Support (Critical for Socket.IO)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;

        # Long timeouts for persistent connections
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 60s;

        # Disable buffering for real-time data
        proxy_buffering off;
    }

    # ========================================================================
    # JUDGE SERVICE ROUTES (Code Execution)
    # ========================================================================
    
    location /api/judge/ {
        # Apply judge-specific rate limit (code execution is expensive)
        limit_req zone=judge_limit burst=10 nodelay;

        proxy_pass http://judge_server;
        proxy_http_version 1.1;
        
        # Headers for proper request forwarding
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Timeouts (code execution can take longer)
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # Disable buffering for streaming responses
        proxy_buffering off;
    }

    # ========================================================================
    # HEALTH CHECK ENDPOINT
    # ========================================================================
    
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ========================================================================
    # LETSENCRYPT ACME CHALLENGE
    # ========================================================================
    
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

# ============================================================================
# HTTP SERVER (Redirect to HTTPS)
# ============================================================================

server {
    listen 80;
    server_name api-codearena.duckdns.org;

    # ACME challenge for Let's Encrypt renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

