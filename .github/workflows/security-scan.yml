name: Security Scan

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    # Run security scan every Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  dependency-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Backend Dependency Audit
        working-directory: ./backend
        run: |
          echo "🔍 Scanning backend dependencies..."
          npm audit --audit-level=moderate || echo "⚠️ Vulnerabilities found in backend"

      - name: Frontend Dependency Audit
        working-directory: ./frontend
        run: |
          echo "🔍 Scanning frontend dependencies..."
          npm audit --audit-level=moderate || echo "⚠️ Vulnerabilities found in frontend"

      - name: Judge Service Dependency Audit
        working-directory: ./backend/judge-service
        run: |
          echo "🔍 Scanning judge service dependencies..."
          npm audit --audit-level=moderate || echo "⚠️ Vulnerabilities found in judge service"

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

  docker-scan:
    name: Docker Image Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image for Scanning
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          load: true
          tags: codearena-backend:scan
          cache-from: type=gha

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: codearena-backend:scan
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  code-scan:
    name: Code Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  license-check:
    name: License Compliance Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install license-checker
        run: npm install -g license-checker

      - name: Check Backend Licenses
        working-directory: ./backend
        run: |
          npm ci
          echo "📜 Checking backend licenses..."
          license-checker --summary || echo "⚠️ License issues found"

      - name: Check Frontend Licenses
        working-directory: ./frontend
        run: |
          npm ci
          echo "📜 Checking frontend licenses..."
          license-checker --summary || echo "⚠️ License issues found"

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [dependency-scan, secret-scan, docker-scan, code-scan, license-check]
    if: always()
    
    steps:
      - name: Security Scan Summary
        run: |
          echo "🔒 Security Scan Complete"
          echo "=========================="
          echo "✅ Dependency Scan: ${{ needs.dependency-scan.result }}"
          echo "✅ Secret Scan: ${{ needs.secret-scan.result }}"
          echo "✅ Docker Scan: ${{ needs.docker-scan.result }}"
          echo "✅ Code Scan: ${{ needs.code-scan.result }}"
          echo "✅ License Check: ${{ needs.license-check.result }}"
