name: Deploy Backend to AWS

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            cd ~/codearena/backend
            git pull origin main
            
            # Create production environment file from secrets
            echo "${{ secrets.ENV_PRODUCTION }}" > .env
            
            # Install dependencies and update Prisma client
            npm install
            npx prisma generate
            
            # Run database migrations
            npx prisma migrate deploy
            
            # Ensure Docker Runner Images are built
            docker build -t codearena-java ./docker/java
            docker build -t codearena-cpp ./docker/cpp
            
            # Restart PM2 processes with updated environment
            pm2 restart ecosystem.config.cjs --update-env
            pm2 save
