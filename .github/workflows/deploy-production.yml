name: Deploy to Production

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'production' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
            set -e
            
            echo "📦 Deploying ChallengX to production..."
            
            # Navigate to project directory
            cd ~/CodeArena || {
              echo "❌ Project directory not found. Cloning..."
              git clone https://github.com/${{ github.repository }} ~/CodeArena
              cd ~/CodeArena
            }
            
            # Pull latest changes
            echo "🔄 Pulling latest changes..."
            git fetch origin
            git reset --hard origin/main
            
            # Create production environment files
            echo "🔐 Setting up environment files..."
            echo "${{ secrets.ENV_PRODUCTION }}" > ./backend/.env.production
            echo "${{ secrets.ENV_JUDGE_SERVICE }}" > ./backend/judge-service/.env.production
            
            # Pull latest Docker images
            echo "🐳 Pulling latest Docker images..."
            export DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            docker-compose -f docker-compose.v2.yml pull
            
            # Stop existing containers
            echo "🛑 Stopping existing containers..."
            docker-compose -f docker-compose.v2.yml down
            
            # Start new containers
            echo "🚀 Starting new containers..."
            docker-compose -f docker-compose.v2.yml up -d
            
            # Wait for services to be healthy
            echo "⏳ Waiting for services to be healthy..."
            sleep 10
            
            # Check service health
            echo "🏥 Checking service health..."
            docker-compose -f docker-compose.v2.yml ps
            
            # Run database migrations
            echo "🗄️ Running database migrations..."
            docker-compose -f docker-compose.v2.yml exec -T backend npx prisma migrate deploy || echo "⚠️ Migration failed or not needed"
            
            # Clean up old images
            echo "🧹 Cleaning up old Docker images..."
            docker image prune -af --filter "until=24h"
            
            # Show running containers
            echo "✅ Deployment complete! Running containers:"
            docker-compose -f docker-compose.v2.yml ps
            
            # Show logs (last 50 lines)
            echo "📋 Recent logs:"
            docker-compose -f docker-compose.v2.yml logs --tail=50
          ENDSSH

      - name: Health Check
        run: |
          echo "🏥 Performing health check..."
          sleep 5
          
          # Check backend health
          curl -f https://api.codearena.com/health || echo "⚠️ Backend health check failed"
          
          # Check judge service health
          curl -f https://judge.codearena.com/health || echo "⚠️ Judge service health check failed"

      - name: Notify Deployment Success
        if: success()
        run: |
          echo "✅ Deployment to ${{ github.event.inputs.environment || 'production' }} successful!"
          echo "🚀 Version: ${{ github.sha }}"
          echo "📅 Time: $(date)"

      - name: Notify Deployment Failure
        if: failure()
        run: |
          echo "❌ Deployment to ${{ github.event.inputs.environment || 'production' }} failed!"
          echo "🔍 Check logs for details"

  rollback:
    name: Rollback (Manual)
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()
    environment: production
    
    steps:
      - name: Rollback Instructions
        run: |
          echo "❌ Deployment failed. To rollback:"
          echo "1. SSH into server: ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}"
          echo "2. Navigate to project: cd ~/CodeArena"
          echo "3. Checkout previous version: git checkout <previous-commit>"
          echo "4. Restart containers: docker-compose -f docker-compose.v2.yml up -d"
