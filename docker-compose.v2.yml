services:
  # API Backend Service
  backend:
    image: codearena-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: codearena-backend
    restart: always
    environment:
      - NODE_ENV=production
      - REDIS_URL=${REDIS_URL}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=4000
      - CODEARENA_RUNNERS_PATH=${CODEARENA_RUNNERS_PATH:-/app/runners}
      - JUDGE_SERVICE_URL=http://judge:3001
      - JUDGE_SERVICE_HOST=judge
      - JUDGE_SERVICE_PORT=3001
    env_file:
      - ./backend/.env.production.v2
    depends_on:
      - redis
    networks:
      - codearena-network
    command: sh -c "npx prisma migrate deploy && npm start"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Worker Service (BullMQ Job Processing)
  worker:
    image: codearena-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: codearena-worker
    command: npm run worker:prod
    restart: always
    environment:
      - NODE_ENV=production
      - REDIS_URL=${REDIS_URL}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CODEARENA_RUNNERS_PATH=${CODEARENA_RUNNERS_PATH:-/app/runners}
      - WORKER_CONCURRENCY=10
      - JUDGE_SERVICE_URL=http://judge:3001
      - JUDGE_SERVICE_HOST=judge
      - JUDGE_SERVICE_PORT=3001
    env_file:
      - ./backend/.env.production.v2
    depends_on:
      - redis
    networks:
      - codearena-network

  # Judge Service (Code Execution Microservice) - NEW
  judge:
    image: codearena-judge-service:latest
    build:
      context: ./backend/judge-service
      dockerfile: Dockerfile
    container_name: codearena-judge
    restart: always
    environment:
      - NODE_ENV=production
      - REDIS_URL=${REDIS_URL}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=3001
    env_file:
      - ./backend/judge-service/.env.production
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - redis
    networks:
      - codearena-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Redis Service (Event Bus + Queue)
  redis:
    image: redis:7-alpine
    container_name: codearena-redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - codearena-network
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    # Note: Redis port NOT exposed to external network for security
    # Only accessible from within the Docker network

  # Nginx Reverse Proxy + Load Balancer
  nginx:
    image: nginx:stable-alpine
    container_name: codearena-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./backend/deploy/nginx.v2.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - backend
      - judge
    networks:
      - codearena-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Certbot (SSL Certificate Management)
  certbot:
    image: certbot/certbot
    container_name: codearena-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt:rw
      - ./certbot/www:/var/www/certbot:rw
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

networks:
  codearena-network:
    driver: bridge

volumes:
  redis-data:
