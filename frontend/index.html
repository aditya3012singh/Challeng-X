<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/image.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChallengX</title>
  <style>
    #preloader {
      position: fixed;
      inset: 0;
      background: #050505;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .loader-logo {
      width: 100px;
      height: 100px;
      object-fit: contain;
      filter: drop-shadow(0 0 30px rgba(255, 170, 0, 0.2));
      animation: pulse 2s infinite ease-in-out;
    }

    .loader-text {
      margin-top: 24px;
      font-family: 'Outfit', sans-serif;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.6em;
      color: #FFAA00;
      text-transform: uppercase;
      opacity: 0.8;
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(1);
        opacity: 0.8;
        filter: drop-shadow(0 0 20px rgba(255, 170, 0, 0.1));
      }

      50% {
        transform: scale(1.1);
        opacity: 1;
        filter: drop-shadow(0 0 40px rgba(255, 170, 0, 0.4));
      }
    }
  </style>
</head>

<body>
  <div id="root">
    <div id="preloader">
      <img src="/image.png" class="loader-logo" alt="ChallengX" />
      <div class="loader-text">Initializing ChallengX</div>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
