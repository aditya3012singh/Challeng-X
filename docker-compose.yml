version: '3.8'

services:
  backend:
    image: ${DOCKERHUB_USERNAME:-your-username}/codearena-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: codearena-backend
    restart: always
    environment:
      - NODE_ENV=production
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - PORT=${PORT:-4000}
      - CODEARENA_RUNNERS_PATH=${CODEARENA_RUNNERS_PATH}
      - JUDGE_GRPC_HOST=${JUDGE_GRPC_HOST:-judge-service}
      - JUDGE_GRPC_PORT=${JUDGE_GRPC_PORT:-50051}
    env_file:
      - ./backend/.env.production
    depends_on:
      - redis
      - judge-service
    networks:
      - codearena-network

  worker:
    image: ${DOCKERHUB_USERNAME:-your-username}/codearena-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: codearena-worker
    command: npm run worker:prod
    restart: always
    environment:
      - NODE_ENV=production
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - CODEARENA_RUNNERS_PATH=${CODEARENA_RUNNERS_PATH}
      - WORKER_CONCURRENCY=${WORKER_CONCURRENCY:-10}
      - JUDGE_GRPC_HOST=${JUDGE_GRPC_HOST:-judge-service}
      - JUDGE_GRPC_PORT=${JUDGE_GRPC_PORT:-50051}
    env_file:
      - ./backend/.env.production
    depends_on:
      - redis
      - judge-service
    networks:
      - codearena-network

  judge-service:
    image: ${DOCKERHUB_USERNAME:-your-username}/codearena-judge:latest
    build:
      context: .
      dockerfile: ./judge-service/Dockerfile
    container_name: codearena-judge
    restart: always
    environment:
      - GRPC_PORT=${JUDGE_GRPC_PORT:-50051}
      - JUDGE_POOL_SIZE=${JUDGE_POOL_SIZE:-2}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - redis
    networks:
      - codearena-network

  redis:
    image: redis:7-alpine
    container_name: codearena-redis
    restart: always
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - codearena-network

  nginx:
    image: nginx:stable-alpine
    container_name: codearena-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./backend/deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - backend
    networks:
      - codearena-network

  certbot:
    image: certbot/certbot
    container_name: codearena-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt:rw
      - ./certbot/www:/var/www/certbot:rw
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  prometheus:
    image: prom/prometheus:latest
    container_name: codearena-prometheus
    restart: always
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - codearena-network
    depends_on:
      - backend
      - worker

  grafana:
    image: grafana/grafana:latest
    container_name: codearena-grafana
    restart: always
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana-data:/var/lib/grafana
    networks:
      - codearena-network
    depends_on:
      - prometheus

networks:
  codearena-network:
    driver: bridge

volumes:
  redis-data:
  prometheus-data:
  grafana-data:
