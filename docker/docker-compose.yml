services:
  # API Backend Service
  backend:
    image: codearena-backend:latest
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: codearena-backend
    restart: always
    ports:
      - "4000:4000"  # Expose port 4000 to host for frontend development
    depends_on:
      - redis
    networks:
      - codearena-network
    environment:
      - PORT=4000
      - GOOGLE_CALLBACK_URL=http://localhost:4000/api/auth/google/callback
      - GITHUB_CALLBACK_URL=http://localhost:4000/api/auth/github/callback
      - JUDGE_GRPC_HOST=judge
      - JUDGE_GRPC_PORT=50051
    dns:
      - 8.8.8.8
      - 1.1.1.1
    command: sh -c "npx prisma migrate deploy && npm start"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Worker Service (BullMQ Job Processing)
  worker:
    image: codearena-backend:latest
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: codearena-worker
    command: npm run worker:prod
    restart: always
    user: "root"
    environment:
      - CODEARENA_RUNNERS_PATH=/runners
      - JUDGE_GRPC_HOST=judge
      - JUDGE_GRPC_PORT=50051
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /mnt/d/challeng-x/backend/runners:/runners:ro
    depends_on:
      - redis
    networks:
      - codearena-network

  # Judge Service (Code Execution Microservice)
  judge:
    image: codearena-judge-service:latest
    build:
      context: ../judge-service
      dockerfile: Dockerfile
    container_name: codearena-judge
    restart: always
    user: "root"
    environment:
      - CODEARENA_RUNNERS_PATH=${CODEARENA_RUNNERS_PATH:-/mnt/d/challeng-x/backend/runners}
      - GRPC_PORT=${JUDGE_GRPC_PORT:-50051}
      - JUDGE_POOL_SIZE=${JUDGE_POOL_SIZE:-2}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /mnt/d/challeng-x/backend/runners:/host-runners:ro
    command: sh -c "chmod 666 /var/run/docker.sock && npm start"
    depends_on:
      - redis
    networks:
      - codearena-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Redis Service (Event Bus + Queue)
  redis:
    image: redis:7-alpine
    container_name: codearena-redis
    restart: always
    command: redis-server --requirepass codearena_redis_password_2024 --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - codearena-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy + Load Balancer
  nginx:
    image: nginx:stable-alpine
    container_name: codearena-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../backend/deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../certbot/conf:/etc/letsencrypt:ro
      - ../certbot/www:/var/www/certbot:ro
    depends_on:
      - backend
      - judge
    networks:
      - codearena-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Certbot (SSL Certificate Management)
  certbot:
    image: certbot/certbot
    container_name: codearena-certbot
    volumes:
      - ../certbot/conf:/etc/letsencrypt:rw
      - ../certbot/www:/var/www/certbot:rw
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

networks:
  codearena-network:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1400

volumes:
  redis-data:
