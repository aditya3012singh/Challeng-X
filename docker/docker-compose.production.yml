version: "3.8"

services:
  # API Backend Service
  backend:
    image: codearena-backend:production
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: codearena-backend-prod
    restart: always
    # Exposing ports to the host is removed in production for security.
    # Traffic is routed through the nginx reverse proxy.
    env_file:
      - ../backend/.env.production
    environment:
      - NODE_ENV=production
      - PORT=4000
      - JUDGE_GRPC_HOST=judge
      - JUDGE_GRPC_PORT=50051
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - codearena-network
    dns:
      - 8.8.8.8
      - 1.1.1.1
    command: sh -c "npx prisma migrate deploy || true; npm start"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Worker Service (BullMQ Job Processing)
  worker:
    image: codearena-backend:production
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: codearena-worker-prod
    command: npm run worker:prod
    restart: always
    user: "root"
    env_file:
      - ../backend/.env.production
    environment:
      - NODE_ENV=production
      - CODEARENA_RUNNERS_PATH=/runners
      - JUDGE_GRPC_HOST=judge
      - JUDGE_GRPC_PORT=50051
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../backend/runners:/runners:ro
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - codearena-network

  # Judge Service (Code Execution Microservice)
  judge:
    image: codearena-judge-service:production
    build:
      context: ../judge-service
      dockerfile: Dockerfile
    container_name: codearena-judge-prod
    restart: always
    user: "root"
    environment:
      - NODE_ENV=production
      - CODEARENA_RUNNERS_PATH=${CODEARENA_RUNNERS_PATH:-../backend/runners}
      - GRPC_PORT=${JUDGE_GRPC_PORT:-50051}
      - JUDGE_GRPC_PORT=${JUDGE_GRPC_PORT:-50051}
      - JUDGE_POOL_SIZE=${JUDGE_POOL_SIZE:-1} # Increased pool size for production
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../backend/runners:/host-runners:ro
    command: sh -c "chmod 666 /var/run/docker.sock && npm start"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - codearena-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Redis Service (Event Bus + Queue)
  redis:
    image: redis:7-alpine
    container_name: codearena-redis-prod
    restart: always
    # Stronger password for production is recommended. Passed via env/cli.
    command: redis-server --requirepass ${REDIS_PASSWORD:-codearena_redis_password_2024} --appendonly yes
    # Ports not exposed to host in production
    volumes:
      - redis-data-prod:/data
    networks:
      - codearena-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-codearena_redis_password_2024}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy + Load Balancer
  nginx:
    image: nginx:stable-alpine
    container_name: codearena-nginx-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../backend/deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../certbot/conf:/etc/letsencrypt:ro
      - ../certbot/www:/var/www/certbot:ro
    depends_on:
      backend:
        condition: service_healthy
      judge:
        condition: service_healthy
    networks:
      - codearena-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Certbot (SSL Certificate Management)
  certbot:
    image: certbot/certbot
    container_name: codearena-certbot-prod
    volumes:
      - ../certbot/conf:/etc/letsencrypt:rw
      - ../certbot/www:/var/www/certbot:rw
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - codearena-network

networks:
  codearena-network:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1400

volumes:
  redis-data-prod:
